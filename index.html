<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>PaperFly</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #f4845f 0%, #fce5b8 100%);
      font-family: sans-serif;
    }
    #game-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }
    #game-wrap canvas { display: block; }

    #portrait-hint {
      display: none;
      position: fixed; inset: 0;
      background: #0d0d1a; color: #fff;
      font-size: 22px;
      text-align: center;
      justify-content: center; align-items: center;
      flex-direction: column; gap: 16px;
      z-index: 999;
    }
    @media (orientation: portrait) and (max-width: 700px) {
      #portrait-hint { display: flex; }
    }
  </style>
</head>
<body>
  <div id="portrait-hint">
    <span style="font-size:48px">📱</span>
    <p>Please rotate<br>your device</p>
  </div>
  <div id="game-wrap"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
